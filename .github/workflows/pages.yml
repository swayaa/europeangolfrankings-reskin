name: Deploy preview to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site (resolve preview/redesign symlink, add .nojekyll)
        run: |
          set -euo pipefail
          mkdir -p _site
          # cp -L follows the preview/redesign symlink and copies the real files,
          # weil GitHub Pages keinen Symlinks in Subverzeichnissen folgt.
          cp -RL preview/. _site/
          # .nojekyll deaktiviert die Jekyll-Pipeline, damit Dateinamen mit
          # Unterstrich (z. B. sign_in.html) nicht ausgeblendet werden.
          touch _site/.nojekyll
          # Fallback-Index: index.html existiert schon, aber zur Sicherheit
          ls -la _site | head

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
